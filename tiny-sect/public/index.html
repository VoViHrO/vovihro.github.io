<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Sect</title>
    <style>
        body { margin: 0; padding: 0; background: #0a0a1f; color: #a0d8ff; font-family: monospace; overflow: hidden; }
        #game { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .panel { pointer-events: auto; background: rgba(10,10,31,0.95); border: 2px solid #4a90e2; padding: 15px; margin: 10px; border-radius: 4px; max-width: 340px; }
        button { background: #1e2a4a; color: #a0d8ff; border: 1px solid #4a90e2; padding: 8px 12px; margin: 3px; cursor: pointer; font-family: monospace; }
        button:hover { background: #2a3a6a; }
        h2, h3 { margin: 5px 0; color: #ffee88; }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="canvas" width="1280" height="720"></canvas>
        <div id="ui"></div>
    </div>
    <script type="module" src="../src/main.js"></script>
</body>
</html>
